{% extends "base.html" %}
{% block title %}Join {{ league.name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center py-12">
  <h1 class="text-2xl font-bold mb-2">Join league</h1>
  <p class="text-slate-600 mb-8">{{ league.name }}</p>
  {% if pending_membership %}
  <p class="text-sm text-amber-700 mb-4">Your join request is pending admin approval.</p>
  {% endif %}
  <form method="post" action="/invite/{{ token }}/accept">
    <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium">Accept invite</button>
  </form>
</div>
{% endblock %}
