<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: Inter, system-ui, sans-serif; font-feature-settings: 'cv11','ss01'; }</style>
</head>
<body class="min-h-screen flex items-center px-6 antialiased bg-[radial-gradient(1200px_500px_at_50%_-200px,#dbeafe_0%,transparent_60%),linear-gradient(to_bottom,#f8fafc,#ffffff)] text-slate-900">
  <div class="w-full max-w-sm mx-auto pb-24">
    <div class="flex items-center gap-2 text-2xl font-bold text-blue-600 mb-3">
      <span class="h-2 w-2 rounded-full bg-blue-600 shadow-[0_0_0_3px_rgba(37,99,235,0.2)]"></span>
      Padel Tracker
    </div>
    <p class="text-slate-500 text-sm mb-10 leading-relaxed">Demo matches production styling — Inter, soft gradient, lifted card.</p>
    <div class="rounded-3xl bg-white border border-slate-200/70 p-8 shadow-[0_1px_2px_rgba(15,23,42,0.04),0_12px_32px_-20px_rgba(37,99,235,0.22)] space-y-5">
      <label class="block text-sm font-medium text-slate-700">Email<input type="email" class="mt-2 w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500/25 focus:border-blue-500"></label>
      <label class="block text-sm font-medium text-slate-700">Password<input type="password" class="mt-2 w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500/25 focus:border-blue-500"></label>
      <button type="button" class="w-full py-3.5 rounded-xl font-semibold text-white bg-blue-600 hover:bg-blue-700 shadow-[0_1px_0_rgba(255,255,255,0.12)_inset,0_8px_20px_-10px_rgba(37,99,235,0.55)]">Sign in</button>
    </div>
    <p class="mt-10 text-center text-sm font-semibold text-blue-600"><a href="#" class="hover:text-blue-800">Create account</a></p>
  </div>
</body>
</html>
