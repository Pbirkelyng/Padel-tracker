{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 px-4">
  <h1 class="text-3xl font-bold text-slate-900 mb-2">Create account</h1>
  <p class="text-slate-500 mb-8">An admin approves access before you can use leagues.</p>
  {% if error %}
  <div class="mb-4 p-4 rounded-xl bg-red-50 border border-red-200 text-red-800 text-sm">{{ error }}</div>
  {% endif %}
  <form method="post" action="/register" class="space-y-4 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
    <label class="block text-sm text-slate-600">Display name
      <input type="text" name="display_name" required class="mt-1 w-full border border-slate-300 rounded-xl px-3 py-2">
    </label>
    <label class="block text-sm text-slate-600">Email
      <input type="email" name="email" required class="mt-1 w-full border border-slate-300 rounded-xl px-3 py-2">
    </label>
    <label class="block text-sm text-slate-600">Password (min 6)
      <input type="password" name="password" required minlength="6" class="mt-1 w-full border border-slate-300 rounded-xl px-3 py-2">
    </label>
    <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium">Register</button>
  </form>
  <p class="mt-6 text-center text-slate-500 text-sm"><a href="/login" class="text-blue-600 font-medium">Sign in</a></p>
</div>
{% endblock %}
