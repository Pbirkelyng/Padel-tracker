{% extends "base.html" %}
{% block title %}Pending{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-24 text-center px-4">
  <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-amber-100 flex items-center justify-center text-2xl">⌛</div>
  <h1 class="text-2xl font-bold text-slate-900 mb-2">Awaiting approval</h1>
  <p class="text-slate-500">{{ user.display_name }}, you&apos;ll get access once an admin approves your account.</p>
  <form action="/logout" method="post" class="mt-8">
    <button type="submit" class="text-sm text-blue-600">Sign out</button>
  </form>
</div>
{% endblock %}
