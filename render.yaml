services:
  - type: web
    name: padel-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: padel-db
          property: connectionString

databases:
  - name: padel-db
    plan: free
